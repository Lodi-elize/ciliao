spring.application.name=ciliao-server
server.port=${PORT:4000}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/ciliao-dev;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

ciliao.upload.avatar-dir=${CILIAO_AVATAR_DIR:uploads/avatars}
